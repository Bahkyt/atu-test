<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему | ATU AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .login-card { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#1e3a8a 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-opacity: 0.05;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex flex-col">

    <header class="p-6 flex justify-between items-center w-full max-w-7xl mx-auto">
        <a href="{{ url_for('main') }}" class="text-xl font-black text-[#1e3a8a] tracking-tighter uppercase">
            ATU <span class="text-blue-500">TEAMS</span>
        </a>
        
        <div class="flex bg-white/80 backdrop-blur-sm p-1 rounded-xl border border-gray-100 shadow-sm">
            <button onclick="setLanguage('kk')" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-lg transition" id="btn-kk">KK</button>
            <button onclick="setLanguage('ru')" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-lg bg-white shadow-sm transition" id="btn-ru">RU</button>
            <button onclick="setLanguage('en')" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-lg transition" id="btn-en">EN</button>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-[440px] login-card">
            
            <div class="bg-white rounded-[3rem] shadow-2xl shadow-blue-900/5 border border-gray-100 overflow-hidden">
                <div class="p-10 md:p-12">
                    <div class="text-center mb-10">
                        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl shadow-inner">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <h2 class="text-3xl font-black text-gray-900 tracking-tight" data-i18n="login_title">С возвращением!</h2>
                        <p class="text-gray-400 text-sm mt-2 font-medium opacity-0" data-i18n="login_subtitle">Войдите, чтобы управлять командой</p>
                    </div>

                    <form action="{{ url_for('login') }}" method="post" class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-4 tracking-widest" data-i18n="lbl_email">Login</label>
                            <div class="relative">
                                <i class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                                <input type="text" required placeholder="login" name="login"
                                    class="w-full pl-12 pr-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:border-blue-500 focus:bg-white transition-all font-medium text-sm">
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-2 px-4">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest" data-i18n="lbl_pass">Пароль</label>
<!--                                <a href="{{ url_for('main') }}" class="text-[10px] font-bold text-blue-500 hover:text-blue-700 uppercase tracking-tighter" data-i18n="forgot_pass">Забыли?</a>-->
                            </div>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                                <input type="password" name="password" id="passwordField" required placeholder="••••••••"
                                    class="w-full pl-12 pr-12 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:border-blue-500 focus:bg-white transition-all text-sm">
                                <button type="button" onclick="togglePass()" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 hover:text-blue-500 transition">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="submit" class="w-full py-5 bg-[#1e3a8a] text-white rounded-2xl font-black text-sm hover:bg-blue-600 transition shadow-xl shadow-blue-100 uppercase tracking-[0.2em]" data-i18n="btn_login">
                                Войти в профиль
                            </button>
                        </div>
                    </form>
                </div>

                <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
                    <p class="text-xs text-gray-400 font-medium opacity-0">
                        <span data-i18n="no_account">Нет доступа? Обратитесь к</span> 
                        <a href="mailto:admin@atu.kz" class="text-blue-500 font-bold hover:underline">Администратору</a>
                    </p>
                </div>
            </div>

            <div class="text-center mt-8">
                <a href="javascript:history.back()" class="text-gray-400 hover:text-gray-600 text-xs font-bold transition flex items-center justify-center uppercase tracking-widest">
                    <i class="fas fa-arrow-left mr-2"></i> <span data-i18n="go_home">На главную</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        const i18n = {
            ru: {
                login_title: "С возвращением!", login_subtitle: "Войдите, чтобы управлять командой",
                lbl_email: "Login", lbl_pass: "Пароль", forgot_pass: "Забыли?",
                btn_login: "Войти в профиль", no_account: "Нет доступа? Обратитесь к", go_home: "На главную"
            },
            kk: {
                login_title: "Қош келдіңіз!", login_subtitle: "Команданы басқару үшін жүйеге кіріңіз",
                lbl_email: "Login", lbl_pass: "Құпия сөз", forgot_pass: "Ұмыттыңыз ба?",
                btn_login: "Профильге кіру", no_account: "Рұқсатыңыз жоқ па? Хабарласыңыз:", go_home: "Басты бетке"
            },
            en: {
                login_title: "Welcome Back!", login_subtitle: "Log in to manage your team",
                lbl_email: "Login", lbl_pass: "Password", forgot_pass: "Forgot?",
                btn_login: "Sign In", no_account: "No access? Contact", go_home: "Go Home"
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('bg-white', 'shadow-sm'));
            document.getElementById(`btn-${lang}`).classList.add('bg-white', 'shadow-sm');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = i18n[lang][el.getAttribute('data-i18n')];
            });
        }

        function togglePass() {
            const field = document.getElementById('passwordField');
            const icon = document.getElementById('eyeIcon');
            if (field.type === "password") {
                field.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            // Имитация входа
            window.location.href = "team-profile.html"; 
        }

        window.onload = () => setLanguage('ru');
    </script>
</body>
</html>
