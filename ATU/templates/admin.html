<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Teams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link.active { background: #f0f7ff; color: #2563eb; border-right: 4px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-50 flex">

    <aside class="w-64 min-h-screen bg-white border-r border-gray-200 hidden md:block sticky top-0">
        <div class="p-6">
            <a href="{{ url_for('main') }}" class="text-2xl font-black text-blue-900 tracking-tighter uppercase">ATU Teams</a>
        </div>
        <nav class="mt-6">
            <a href="{{ url_for('admin') }}" class="sidebar-link active flex items-center px-6 py-4 text-gray-600">
                <i class="fas fa-user-group mr-3"></i> <span data-i18n="nav_teams">Команды</span>
            </a>
            <a href="{{ url_for('winners') }}" class="sidebar-link flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition">
                <i class="fas fa-trophy mr-3"></i>
                <span data-i18n="nav_winners">Победители</span>
            </a>
             <a href="{{ url_for('time_site') }}" class="sidebar-link flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition">
                <i class="fas fa-trophy mr-3"></i>
                <span data-i18n="nav_timer">Время</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1">


        <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 px-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-100">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-gray-900">Удаление победителя</h3>
                <button type="button" onclick="closeDeleteModal()" class="text-gray-400 hover:text-gray-700 text-xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="text-sm text-gray-500 mt-2">
                Для удаления команды <span id="deleteWinnerName" class="font-bold text-gray-800"></span> введите пароль.
            </p>
        </div>

        <form id="deleteForm" onsubmit="handleDeleteConfirm(event)" class="text-left">
            <div class="p-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Пароль</label>
                <input
                    type="password"
                    name="password"
                    required
                    id="deletePasswordInput"
                    placeholder="Введите пароль"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-400"
                >

                <p id="deleteErrorText" class="text-sm text-red-500 mt-3 hidden"></p>
            </div>

            <div class="p-6 pt-0 flex justify-end gap-3">
                <button
                    type="button"
                    onclick="closeDeleteModal()"
                    class="px-5 py-3 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition"
                >
                    Отмена
                </button>
                <button
                    id="confirmDeleteBtn"
                    type="submit"
                    class="px-5 py-3 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold transition"
                >
                    Удалить
                </button>
            </div>
        </form>
    </div>
</div>






        <header class="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl font-bold text-gray-800" data-i18n="header_title">Управление командами</h2>

            <div class="flex items-center space-x-6">
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <button onclick="setLanguage('kk')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg transition" id="btn-kk">KK</button>
                    <button onclick="setLanguage('ru')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg bg-white shadow-sm transition" id="btn-ru">RU</button>
                    <button onclick="setLanguage('en')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg transition" id="btn-en">EN</button>
                </div>
                <a href="{{ url_for('logout') }}"><div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white text-xs font-bold">Выйти</div></a>
            </div>
        </header>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium" data-i18n="stat_teams">Всего команд</p>
                    <h3 class="text-3xl font-black text-gray-900" id="stat-total-teams">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium" data-i18n="stat_participants">Всего участников</p>
                    <h3 class="text-3xl font-black text-blue-600" id="stat-total-members">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium" data-i18n="stat_avg">Средний состав</p>
                    <h3 class="text-3xl font-black text-purple-600" id="stat-avg-size">0</h3>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="relative w-full md:w-96">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="searchInput" oninput="handleFilter()" placeholder="Поиск по команде или капитану..." data-i18n-placeholder="search_placeholder" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                    </div>

                    <select id="trackFilter" onchange="handleFilter()" class="w-full md:w-64 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:outline-none">
                        <option value="all" data-i18n="track_all">Все направления</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_team">Команда</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_captain">Капитан</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_members">Участники</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_track">Трек</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right" data-i18n="th_actions">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="teamsTable" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const teams = [
            {% for item in info %}
            {
                id: {{ item.id }},
                name: "{{ item.team_name }}",
                captain: "{{ item.captain_name }}",
                email: "{{ item.captain_email }}",
                members: "{{ item.members_count }}",
                track: "{{ item.track }}",
                status: "confirmed"
            }{% if not loop.last %},{% endif %}
            {% endfor %}
        ];
        const i18n = {
            ru: {
                nav_teams: "Команды", nav_winners: "Победители", nav_timer: "Время", header_title: "Управление командами",
                stat_teams: "Всего команд", stat_participants: "Всего участников", stat_avg: "Средний состав",
                search_placeholder: "Поиск по команде или капитану...", track_all: "Все направления",
                th_team: "Команда", th_captain: "Капитан", th_members: "Участники", th_track: "Трек", th_actions: "Действия"
            },
            kk: {
                nav_teams: "Командалар", nav_winners: "Жеңімпаздар", nav_timer: "Уақыт", header_title: "Командаларды басқару",
                stat_teams: "Барлық команда", stat_participants: "Барлық қатысушы", stat_avg: "Орташа құрам",
                search_placeholder: "Команда немесе капитан бойынша іздеу...", track_all: "Барлық бағыттар",
                th_team: "Команда", th_captain: "Капитан", th_members: "Қатысушылар", th_track: "Трек", th_actions: "Әрекеттер"
            },
            en: {
                nav_teams: "Teams", nav_winners: "Winners", nav_timer: "Time", header_title: "Team Management",
                stat_teams: "Total Teams", stat_participants: "Total Participants", stat_avg: "Avg Team Size",
                search_placeholder: "Search by team or captain...", track_all: "All Tracks",
                th_team: "Team", th_captain: "Captain", th_members: "Members", th_track: "Track", th_actions: "Actions"
            }
        };

        function renderTable(data) {
            const tbody = document.getElementById('teamsTable');
            tbody.innerHTML = '';

            data.forEach(t => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50/50 transition">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <a href="/control-room-7x/dashboard/${t.name}" ><div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black mr-3 text-xs shadow-lg shadow-blue-200">${t.name[0]}</div></a>
                                <a href="/control-room-7x/dashboard/${t.name}" ><p class="text-sm font-bold text-gray-900 uppercase tracking-tight">${t.name}</p></a>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <a href="/control-room-7x/dashboard/${t.name}" ><p class="text-sm font-semibold text-gray-800">${t.captain}</p></a>
                            <a href="/control-room-7x/dashboard/${t.name}" ><p class="text-xs text-gray-400">${t.email}</p></a>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center space-x-1">
                                <a href="/control-room-7x/dashboard/${t.name}" ><span class="text-sm font-bold text-gray-700">${t.members}</span></a>
                                <i class="fas fa-user text-[10px] text-gray-300"></i>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${getTrackClass(t.track)}">
                                ${t.track}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a href="/control-room-7x/dashboard/${t.name}" ><button class="text-gray-400 hover:text-blue-600 mx-2"><i class="fas fa-external-link-alt"></i></button></a>
<button onclick="openDeleteModal(${t.id}, '${String(t.name).replace(/'/g, "\\'")}')" class="text-gray-400 hover:text-red-500 mx-2">
    <i class="fas fa-trash-alt"></i>
</button>
                        </td>
                    </tr>
                `;
            });
            updateStats(data);
        }

let selectedWinnerId = null;
let selectedWinnerName = null;

function openDeleteModal(id, name) {
    selectedWinnerId = id;
    selectedWinnerName = name;

    document.getElementById("deleteWinnerName").innerText = name;
    document.getElementById("deletePasswordInput").value = "";
    document.getElementById("deleteErrorText").innerText = "";
    document.getElementById("deleteErrorText").classList.add("hidden");

    const modal = document.getElementById("deleteModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
}

function closeDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");

    selectedWinnerId = null;
    selectedWinnerName = null;
}

async function handleDeleteConfirm(e) {
    e.preventDefault();

    const form = document.getElementById("deleteForm");
    const btn = document.getElementById("confirmDeleteBtn");
    const errorText = document.getElementById("deleteErrorText");

    errorText.innerText = "";
    errorText.classList.add("hidden");

    const data = {
        password: form.password.value
    };

    if (!selectedWinnerId) {
        errorText.innerText = "Не найден id записи";
        errorText.classList.remove("hidden");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Удаление...";

    try {
        const response = await fetch(`/control-room-7x/dashboard/delete/${selectedWinnerId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        console.log("response status:", response.status);
        console.log("result:", result);

        if (response.ok && result.status === "ok") {
            closeDeleteModal();
            location.reload();
        } else if (result.status === "password-error") {
            errorText.innerText = "Ошибка, неверный пароль.";
            errorText.classList.remove("hidden");
        } else {
            errorText.innerText = result.message || "Ошибка при удалении";
            errorText.classList.remove("hidden");
        }
    } catch (error) {
        errorText.innerText = "Ошибка сети или сервера";
        errorText.classList.remove("hidden");
        console.error("fetch error:", error);
    } finally {
        btn.disabled = false;
        btn.innerText = "Удалить";
    }
}





        function getTrackClass(track) {
            if (track === 'Green') return 'bg-green-100 text-green-700';
            if (track === 'Campus') return 'bg-blue-100 text-blue-700';
            return 'bg-purple-100 text-purple-700';
        }

        function handleFilter() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const track = document.getElementById('trackFilter').value;

            const filtered = teams.filter(t => {
                const matchesSearch = t.name.toLowerCase().includes(search) || t.captain.toLowerCase().includes(search);
                const matchesTrack = track === 'all' || t.track === track;
                return matchesSearch && matchesTrack;
            });

            renderTable(filtered);
        }

        function updateStats(data) {
        const totalMembers = data.reduce((sum, t) => sum + Number(t.members || 0), 0);
            document.getElementById('stat-total-teams').innerText = data.length;
            document.getElementById('stat-total-members').innerText = totalMembers;
            document.getElementById('stat-avg-size').innerText = data.length ? (totalMembers / data.length).toFixed(1) : 0;
        }

        function setLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('bg-white', 'shadow-sm'));
            document.getElementById(`btn-${lang}`).classList.add('bg-white', 'shadow-sm');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = i18n[lang][el.getAttribute('data-i18n')];
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')];
            });
        }

        window.onload = () => {
            renderTable(teams);
            setLanguage('ru');
        };
    </script>

</body>
</html>
