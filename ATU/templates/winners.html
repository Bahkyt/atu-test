<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Winners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link.active { background: #f0f7ff; color: #2563eb; border-right: 4px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-50 flex">

    <aside class="w-64 min-h-screen bg-white border-r border-gray-200 hidden md:block sticky top-0">
        <div class="p-6">
            <a href="{{ url_for('main') }}" class="text-2xl font-black text-blue-900 tracking-tighter uppercase">ATU Teams</a>
        </div>
        <nav class="mt-6">
            <a href="{{ url_for('admin') }}" class="sidebar-link flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition">
                <i class="fas fa-user-group mr-3"></i>
                <span data-i18n="nav_teams">Команды</span>
            </a>
            <a href="{{ url_for('winners') }}" class="sidebar-link active flex items-center px-6 py-4 text-gray-600">
                <i class="fas fa-trophy mr-3"></i>
                <span data-i18n="nav_winners">Победители</span>
            </a>
             <a href="{{ url_for('time_site') }}" class="sidebar-link flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition">
                <i class="fas fa-trophy mr-3"></i>
                <span data-i18n="nav_timer">Время</span>
            </a>

        </nav>
    </aside>

    <main class="flex-1">

<div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 px-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-100">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-gray-900">Удаление победителя</h3>
                <button type="button" onclick="closeDeleteModal()" class="text-gray-400 hover:text-gray-700 text-xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="text-sm text-gray-500 mt-2">
                Для удаления команды <span id="deleteWinnerName" class="font-bold text-gray-800"></span> введите пароль.
            </p>
        </div>

        <form id="deleteForm" onsubmit="handleDeleteConfirm(event)" class="text-left">
            <div class="p-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Пароль</label>
                <input
                    type="password"
                    name="password"
                    required
                    id="deletePasswordInput"
                    placeholder="Введите пароль"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-400"
                >

                <p id="deleteErrorText" class="text-sm text-red-500 mt-3 hidden"></p>
            </div>

            <div class="p-6 pt-0 flex justify-end gap-3">
                <button
                    type="button"
                    onclick="closeDeleteModal()"
                    class="px-5 py-3 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition"
                >
                    Отмена
                </button>
                <button
                    id="confirmDeleteBtn"
                    type="submit"
                    class="px-5 py-3 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold transition"
                >
                    Удалить
                </button>
            </div>
        </form>
    </div>
</div>



        <header class="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl font-bold text-gray-800" data-i18n="header_title">Победители</h2>

            <div class="flex items-center space-x-6">
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <button onclick="setLanguage('kk')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg transition" id="btn-kk">KK</button>
                    <button onclick="setLanguage('ru')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg bg-white shadow-sm transition" id="btn-ru">RU</button>
                    <button onclick="setLanguage('en')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg transition" id="btn-en">EN</button>
                </div>
                <a href="{{ url_for('logout') }}"><div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white text-xs font-bold">Выйти</div></a>
            </div>
        </header>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium" data-i18n="stat_total_winners">Всего победителей</p>
                    <h3 class="text-3xl font-black text-gray-900" id="stat-total-winners">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium" data-i18n="stat_total_members">Всего участников</p>
                    <h3 class="text-3xl font-black text-blue-600" id="stat-total-members">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium" data-i18n="stat_avg">Средний состав</p>
                    <h3 class="text-3xl font-black text-purple-600" id="stat-avg-size">0</h3>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="relative w-full md:w-96">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input
                            type="text"
                            id="searchInput"
                            oninput="handleFilter()"
                            placeholder="Поиск по командам..."
                            data-i18n-placeholder="search_placeholder"
                            class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20"
                        >
                    </div>

                    <select
                        id="yearFilter"
                        onchange="handleFilter()"
                        class="w-full md:w-64 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:outline-none"
                    >
                        <option value="all" data-i18n="year_all">Все годы</option>
                    </select>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
<thead>
    <tr class="bg-gray-50 border-b border-gray-100">
        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_team">Команда</th>
        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_members">Участники</th>
        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_year">Год</th>
        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider" data-i18n="th_place">Место</th>
        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right" data-i18n="th_actions">Действия</th>
    </tr>
</thead>
                        <tbody id="winnersTable" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

<script>
    const winners = [
        {% for item in info %}
        {
            id: {{ item.id }},
            name: {{ item.team_name | tojson }},
            year: {{ item.year | tojson }},
            place: {{ item.team_place | tojson }},
            members: {{ item.members_count | tojson }}
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];

    const i18n = {
        ru: {
            nav_teams: "Команды",
            nav_winners: "Победители",
            nav_timer: "Время",
            header_title: "Победители",
            stat_total_winners: "Всего победителей",
            stat_total_members: "Всего участников",
            stat_avg: "Средний состав",
            search_placeholder: "Поиск по командам...",
            year_all: "Все годы",
            th_team: "Команда",
            th_members: "Участники",
            th_year: "Год",
            th_place: "Место",
            th_actions: "Действия"
        },
        kk: {
            nav_teams: "Командалар",
            nav_winners: "Жеңімпаздар",
            nav_timer: "Уақыт",
            header_title: "Жеңімпаздар",
            stat_total_winners: "Барлық жеңімпаздар",
            stat_total_members: "Барлық қатысушылар",
            stat_avg: "Орташа құрам",
            search_placeholder: "Командалар бойынша іздеу...",
            year_all: "Барлық жылдар",
            th_team: "Команда",
            th_members: "Қатысушылар",
            th_year: "Жыл",
            th_place: "Орын",
            th_actions: "Әрекеттер"
        },
        en: {
            nav_teams: "Teams",
            nav_winners: "Winners",
            nav_timer: "Time",
            header_title: "Winners",
            stat_total_winners: "Total Winners",
            stat_total_members: "Total Participants",
            stat_avg: "Avg Team Size",
            search_placeholder: "Search by teams...",
            year_all: "All years",
            th_team: "Team",
            th_members: "Members",
            th_year: "Year",
            th_place: "Place",
            th_actions: "Actions"
        }
    };

    function getPlaceBadge(place) {
        const p = Number(place);
        if (p === 1) return "bg-yellow-100 text-yellow-700";
        if (p === 2) return "bg-gray-100 text-gray-700";
        if (p === 3) return "bg-orange-100 text-orange-700";
        return "bg-blue-100 text-blue-700";
    }

    function renderTable(data) {
        const tbody = document.getElementById("winnersTable");
        tbody.innerHTML = "";

        data.forEach(t => {
            const firstLetter = t.name ? t.name[0].toUpperCase() : "?";

            tbody.innerHTML += `
                <tr class="hover:bg-gray-50/50 transition">
                    <td class="px-6 py-4">
                        <a href="/control-room-7x/winners/${t.name}" class="flex items-center">
                            <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black mr-3 text-xs shadow-lg shadow-blue-200">
                                ${firstLetter}
                            </div>
                            <p class="text-sm font-bold text-gray-900 uppercase tracking-tight">${t.name}</p>
                        </a>
                    </td>

                    <td class="px-6 py-4">
                        <a href="/control-room-7x/winners/${t.name}" class="text-gray-400 hover:text-blue-600 mx-2"><div class="flex items-center space-x-1">
                            <span class="text-sm font-bold text-gray-700">${t.members}</span>
                            <i class="fas fa-user text-[10px] text-gray-300"></i>
                        </div></a>
                    </td>

                    <td class="px-6 py-4">
                        <a href="/control-room-7x/winners/${t.name}" class="text-gray-400 hover:text-blue-600 mx-2"><span class="text-sm font-bold text-gray-700">${t.year}</span></a>
                    </td>

                    <td class="px-6 py-4">
                        <a href="/control-room-7x/winners/${t.name}" class="text-gray-400 hover:text-blue-600 mx-2"><span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${getPlaceBadge(t.place)}">
                            TOP ${t.place}
                        </span></a>
                    </td>

                    <td class="px-6 py-4 text-right">
                        <a href="/control-room-7x/winners/${t.name}" class="text-gray-400 hover:text-blue-600 mx-2">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
<button onclick="openDeleteModal(${t.id}, '${String(t.name).replace(/'/g, "\\'")}')" class="text-gray-400 hover:text-red-500 mx-2">
    <i class="fas fa-trash-alt"></i>
</button>
                    </td>
                </tr>
            `;
        });

        updateStats(data);
    }

let selectedWinnerId = null;
let selectedWinnerName = null;

function openDeleteModal(id, name) {
    selectedWinnerId = id;
    selectedWinnerName = name;

    document.getElementById("deleteWinnerName").innerText = name;
    document.getElementById("deletePasswordInput").value = "";
    document.getElementById("deleteErrorText").innerText = "";
    document.getElementById("deleteErrorText").classList.add("hidden");

    const modal = document.getElementById("deleteModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
}

function closeDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");

    selectedWinnerId = null;
    selectedWinnerName = null;
}

async function handleDeleteConfirm(e) {
    e.preventDefault();

    const form = document.getElementById("deleteForm");
    const btn = document.getElementById("confirmDeleteBtn");
    const errorText = document.getElementById("deleteErrorText");

    errorText.innerText = "";
    errorText.classList.add("hidden");

    const data = {
        password: form.password.value
    };

    if (!selectedWinnerId) {
        errorText.innerText = "Не найден id записи";
        errorText.classList.remove("hidden");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Удаление...";

    try {
        const response = await fetch(`/control-room-7x/winners/delete/${selectedWinnerId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        console.log("response status:", response.status);
        console.log("result:", result);

        if (response.ok && result.status === "ok") {
            closeDeleteModal();
            location.reload();
        } else if (result.status === "password-error") {
            errorText.innerText = "Ошибка, неверный пароль.";
            errorText.classList.remove("hidden");
        } else {
            errorText.innerText = result.message || "Ошибка при удалении";
            errorText.classList.remove("hidden");
        }
    } catch (error) {
        errorText.innerText = "Ошибка сети или сервера";
        errorText.classList.remove("hidden");
        console.error("fetch error:", error);
    } finally {
        btn.disabled = false;
        btn.innerText = "Удалить";
    }
}

document.addEventListener("keydown", function (e) {
    const modal = document.getElementById("deleteModal");

    if (!modal.classList.contains("hidden")) {
        if (e.key === "Escape") {
            closeDeleteModal();
        }

        if (e.key === "Enter") {
            confirmDeleteWinner();
        }
    }
});

    function updateStats(data) {
        const totalMembers = data.reduce((sum, t) => sum + Number(t.members || 0), 0);
        document.getElementById("stat-total-winners").innerText = data.length;
        document.getElementById("stat-total-members").innerText = totalMembers;
        document.getElementById("stat-avg-size").innerText =
            data.length ? (totalMembers / data.length).toFixed(1) : "0";
    }

    function populateYearFilter() {
        const yearFilter = document.getElementById("yearFilter");
        const currentValue = yearFilter.value || "all";

        const minYear = 2026;
        const years = winners
            .map(item => Number(item.year))
            .filter(year => !Number.isNaN(year));

        const maxDataYear = years.length ? Math.max(...years) : 2026;
        const maxYear = Math.max(minYear, maxDataYear);

        yearFilter.innerHTML = "";

        const allOption = document.createElement("option");
        allOption.value = "all";
        allOption.textContent = "Все годы";
        yearFilter.appendChild(allOption);

        for (let year = minYear; year <= maxYear; year++) {
            const option = document.createElement("option");
            option.value = String(year);
            option.textContent = String(year);
            yearFilter.appendChild(option);
        }

        yearFilter.value = [...yearFilter.options].some(opt => opt.value === currentValue)
            ? currentValue
            : "all";
    }

    function handleFilter() {
        const search = document.getElementById("searchInput").value.toLowerCase().trim();
        const year = document.getElementById("yearFilter").value;

        const filtered = winners.filter(t => {
            const matchesSearch = String(t.name || "").toLowerCase().includes(search);
            const matchesYear = year === "all" || String(t.year) === year;
            return matchesSearch && matchesYear;
        });

        renderTable(filtered);
    }

    function setLanguage(lang) {
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.classList.remove("bg-white", "shadow-sm");
        });

        document.getElementById(`btn-${lang}`)?.classList.add("bg-white", "shadow-sm");

        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (i18n[lang] && i18n[lang][key]) {
                el.innerText = i18n[lang][key];
            }
        });

        document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
            const key = el.getAttribute("data-i18n-placeholder");
            if (i18n[lang] && i18n[lang][key]) {
                el.placeholder = i18n[lang][key];
            }
        });

        const allOption = document.querySelector('#yearFilter option[value="all"]');
        if (allOption && i18n[lang]) {
            allOption.textContent = i18n[lang].year_all;
        }
    }

    window.onload = () => {
        populateYearFilter();
        renderTable(winners);
        setLanguage("ru");
    };
</script>
</body>
</html>
