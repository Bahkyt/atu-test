<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Teams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link.active { background: #f0f7ff; color: #2563eb; border-right: 4px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-50 flex">

    <aside class="w-64 min-h-screen bg-white border-r border-gray-200 hidden md:block sticky top-0">
        <div class="p-6">
            <a href="{{ url_for('main') }}" class="text-2xl font-black text-blue-900 tracking-tighter uppercase">ATU Teams</a>
        </div>
        <nav class="mt-6">
            <a href="{{ url_for('admin') }}" class="sidebar-link flex items-center px-6 py-4 text-gray-600">
                <i class="fas fa-user-group mr-3"></i> <span data-i18n="nav_teams">Команды</span>
            </a>
            <a href="{{ url_for('winners') }}" class="sidebar-link flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition">
                <i class="fas fa-trophy mr-3"></i>
                <span data-i18n="nav_winners">Победители</span>
            </a>
             <a href="{{ url_for('time_site') }}" class="sidebar-link active flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition">
                <i class="fas fa-trophy mr-3"></i>
                <span data-i18n="nav_timer">Время</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1">

<div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 px-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-100">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-gray-900">Очистка участников</h3>
                <button type="button" onclick="closeDeleteModal()" class="text-gray-400 hover:text-gray-700 text-xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p data-i18n="pass" class="text-sm text-gray-500 mt-2">
                Для удаления всех участников введите пароль.
            </p>
        </div>

        <form id="deleteForm" onsubmit="handleDeleteConfirm(event)" class="text-left">
            <div class="p-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Пароль</label>
                <input
                    type="password"
                    name="password"
                    required
                    id="deletePasswordInput"
                    placeholder="Введите пароль"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-400"
                >

                <p id="deleteErrorText" class="text-sm text-red-500 mt-3 hidden"></p>
            </div>

            <div class="p-6 pt-0 flex justify-end gap-3">
                <button
                    type="button"
                    onclick="closeDeleteModal()"
                    class="px-5 py-3 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition"
                >
                    Отмена
                </button>
                <button
                    id="confirmDeleteBtn"
                    type="submit"
                    class="px-5 py-3 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold transition"
                >
                    Удалить всех участников (победители сохраняются, удаляются только участники)
                </button>
            </div>
        </form>
    </div>
</div>




        <header class="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl font-bold text-gray-800" data-i18n="header_title">Управление командами</h2>

            <div class="flex items-center space-x-6">
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <button onclick="setLanguage('kk')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg transition" id="btn-kk">KK</button>
                    <button onclick="setLanguage('ru')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg bg-white shadow-sm transition" id="btn-ru">RU</button>
                    <button onclick="setLanguage('en')" class="lang-btn px-3 py-1 text-xs font-bold rounded-lg transition" id="btn-en">EN</button>
                </div>
                <a href="{{ url_for('logout') }}"><div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white text-xs font-bold">Выйти</div></a>
            </div>
        </header>
<form action="{{ url_for('set_time') }}" method="post">
    <div class="p-8">

        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-5">
            <label class="block rounded-3xl border border-slate-200 bg-slate-50 p-5">
                <div class="flex items-center justify-between gap-3">
                    <span class="text-sm font-bold text-slate-700">Календарь: от</span>
                    <span class="text-xs font-semibold text-slate-400 uppercase">Start</span>
                </div>
<input id="dateFrom" name="dateFrom" type="date"
    value="{{ timeFrom }}"
    class="mt-4 w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-semibold text-slate-800 outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400" />
            </label>

            <label class="block rounded-3xl border border-slate-200 bg-slate-50 p-5">
                <div class="flex items-center justify-between gap-3">
                    <span class="text-sm font-bold text-slate-700">Календарь: до</span>
                    <span class="text-xs font-semibold text-slate-400 uppercase">End</span>
                </div>
<input id="dateTo" name="dateTo" type="date"
    value="{{ timeTo }}"
    class="mt-4 w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-semibold text-slate-800 outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400" />            </label>
        </div>

        <div id="rangeText" class="mt-3 text-xl md:text-2xl font-extrabold tracking-tight">
            Не выбран
        </div>
                            <div class="flex justify-between items-center mb-2 pt-5 px-4">
                                <label class="text-[14px] font-black uppercase tracking-widest" data-i18n="lbl_pass">Пароль</label>
                            </div>

                            <div class="relative">
                                <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                                <input type="password" name="password" id="passwordField" required placeholder="••••••••"
                                    class="w-full pl-12 pr-12 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:border-blue-500 focus:bg-white transition-all text-sm">
                            </div>

        <div class="mt-6">
            <button type="submit"
                class="w-full md:w-auto px-6 py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition">
                Сохранить
            </button>
        </div>
        <h1 class="text-xl font-bold text-red-800 mt-20">ОСТОРОЖНО</h1>




    </div>
</form>
<div class="mt-6">
    <button
        type="button"
        onclick="openDeleteModal()"
        class="w-full md:w-auto px-6 py-4 bg-red-600 text-white font-bold rounded-2xl hover:bg-red-700 transition"
    >
        Удалить всех участников (победители сохраняются, удаляются только участники)
    </button>
</div>
    </main>

    <script>
        const i18n = {
            ru: {
                nav_teams: "Команды", nav_winners: "Победители", nav_timer: "Время", "lbl_pass": "пароль", "pass": "Для удаления всех участников введите пароль", header_title: "Управление Временем",
                stat_teams: "Всего команд", stat_participants: "Всего участников", stat_avg: "Средний состав",
                search_placeholder: "Поиск по команде или капитану...", track_all: "Все направления",
                th_team: "Команда", th_captain: "Капитан", th_members: "Участники", th_track: "Трек", th_actions: "Действия"
            },
            kk: {
                nav_teams: "Командалар", nav_winners: "Жеңімпаздар", nav_timer: "Уақыт", "lbl_pass": "құпия сөз", "pass": "Барлық қатысушыларды жою үшін құпия сөзді енгізіңіз", header_title: "Уақытпен басқару",
                stat_teams: "Барлық команда", stat_participants: "Барлық қатысушы", stat_avg: "Орташа құрам",
                search_placeholder: "Команда немесе капитан бойынша іздеу...", track_all: "Барлық бағыттар",
                th_team: "Команда", th_captain: "Капитан", th_members: "Қатысушылар", th_track: "Трек", th_actions: "Әрекеттер"
            },
            en: {
                nav_teams: "Teams", nav_winners: "Winners", nav_timer: "Time", "lbl_pass": "password", "pass": "To remove all participants, enter the password", header_title: "Time Management",
                stat_teams: "Total Teams", stat_participants: "Total Participants", stat_avg: "Avg Team Size",
                search_placeholder: "Search by team or captain...", track_all: "All Tracks",
                th_team: "Team", th_captain: "Captain", th_members: "Members", th_track: "Track", th_actions: "Actions"
            }
        };

    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const rangeText = document.getElementById('rangeText');
    const rangeHint = document.getElementById('rangeHint');

    function formatDate(dateString) {
      if (!dateString) return '—';
      const [year, month, day] = dateString.split('-');
      return `${day}.${month}.${year}`;
    }

    function updateRange() {
      const from = dateFrom.value;
      const to = dateTo.value;

      if (!from && !to) {
        rangeText.textContent = 'Не выбран';
        rangeHint.textContent = 'Выберите обе даты, чтобы увидеть интервал от–до.';
        return;
      }

      if (from && to && from > to) {
        rangeText.textContent = `${formatDate(from)} — ${formatDate(to)}`;
        rangeHint.textContent = 'Внимание: дата «от» позже даты «до».';
        rangeHint.className = 'mt-2 text-sm text-rose-300';
        return;
      }

      rangeText.textContent = `${formatDate(from)} — ${formatDate(to)}`;
      rangeHint.textContent = 'Период выбран корректно.';
      rangeHint.className = 'mt-2 text-sm text-emerald-300';
    }
    updateRange();

    function toInputDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function setTodayPlusWeek() {
      const now = new Date();
      const future = new Date();
      future.setDate(now.getDate() + 7);
      dateFrom.value = toInputDate(now);
      dateTo.value = toInputDate(future);
      updateRange();
    }

    function setCurrentMonth() {
      const now = new Date();
      const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
      const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      dateFrom.value = toInputDate(firstDay);
      dateTo.value = toInputDate(lastDay);
      updateRange();
    }

    function resetDates() {
      dateFrom.value = '';
      dateTo.value = '';
      updateRange();
    }
function openDeleteModal() {
    document.getElementById("deletePasswordInput").value = "";
    document.getElementById("deleteErrorText").innerText = "";
    document.getElementById("deleteErrorText").classList.add("hidden");

    const modal = document.getElementById("deleteModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
}

function closeDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
}

async function handleDeleteConfirm(e) {
    e.preventDefault();

    const form = document.getElementById("deleteForm");
    const btn = document.getElementById("confirmDeleteBtn");
    const errorText = document.getElementById("deleteErrorText");

    errorText.innerText = "";
    errorText.classList.add("hidden");

    const data = {
        password: form.password.value
    };

    btn.disabled = true;
    btn.innerText = "Удаление...";

    try {
        const response = await fetch("/control-room-7x/participants/clear", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok && result.status === "ok") {
            closeDeleteModal();
            location.reload();
        } else if (result.status === "password-error") {
            errorText.innerText = "Ошибка, неверный пароль.";
            errorText.classList.remove("hidden");
        } else {
            errorText.innerText = result.message || "Ошибка при очистке";
            errorText.classList.remove("hidden");
        }
    } catch (error) {
        errorText.innerText = "Ошибка сети или сервера";
        errorText.classList.remove("hidden");
        console.error(error);
    } finally {
        btn.disabled = false;
        btn.innerText = "Удалить всех участников (победители сохраняются, удаляются только участники)";
    }
}

    dateFrom.addEventListener('input', updateRange);
    dateTo.addEventListener('input', updateRange);
    document.getElementById('todayBtn').addEventListener('click', setTodayPlusWeek);
    document.getElementById('monthBtn').addEventListener('click', setCurrentMonth);
    document.getElementById('resetBtn').addEventListener('click', resetDates);

    setTodayPlusWeek();

        function setLanguage(lang) {
            // Update buttons style
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('bg-white', 'shadow-sm'));
            document.getElementById(`btn-${lang}`).classList.add('bg-white', 'shadow-sm');

            // Translate static text
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = i18n[lang][el.getAttribute('data-i18n')];
            });

            // Translate placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')];
            });
        }

        window.onload = () => {
            renderTable(teams);
            setLanguage('ru');
        };
    </script>

</body>
</html>
